<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solo Cascadia</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="setup-screen" class="setup-screen">
        <h2>Game Setup</h2>
        <div class="setup-mode-row">
          <label>Mode
            <select id="setup-mode">
              <option value="play" selected>Play Game</option>
              <option value="replay">Replay Logfile</option>
            </select>
          </label>
        </div>
        <div class="setup-grid">
          <label>Starting tile
            <select id="setup-starting-tile"></select>
          </label>
          <label>Bear scoring card
            <select id="setup-card-bear"></select>
          </label>
          <label>Elk scoring card
            <select id="setup-card-elk"></select>
          </label>
          <label>Salmon scoring card
            <select id="setup-card-salmon"></select>
          </label>
          <label>Hawk scoring card
            <select id="setup-card-hawk"></select>
          </label>
          <label>Fox scoring card
            <select id="setup-card-fox"></select>
          </label>
        </div>
        <section id="replay-setup-options" class="replay-setup hidden">
          <h3>Replay Log</h3>
          <p>Paste a logfile JSON (v1 snapshot logs and compact v2 logs are supported).</p>
          <textarea id="log-input" placeholder='{"seed":42,"entries":[...]}'></textarea>
          <div class="replay-setup-controls">
            <button id="load-log-btn" type="button">Load Pasted Log</button>
            <button id="load-example-btn" type="button">Load bundled example</button>
          </div>
        </section>
        <button id="start-game-btn" type="button">Start Game</button>
      </section>

      <div id="game-screen" class="hidden">
      <header class="app-header">
        <div>
          <h1>Solo Cascadia</h1>
        </div>
        <button id="restart-btn" type="button">Restart Game</button>
      </header>

      <div class="layout">
        <div class="main-column">
          <section class="top-panel">
            <div class="status-summary">
              <p>Turn: <span id="turn-counter">1 / 20</span></p>
              <p>★ Stars: <span id="star-counter">0</span></p>
              <p>Current score: <span id="score-formula">0 + 0 + 0 = 0</span></p>
            </div>
            <div id="score-breakdown" class="score-breakdown"></div>
          </section>

          <section class="board-section">
            <h2>Biome Map</h2>
            <div id="board" class="hex-board" aria-label="Hex board"></div>
          </section>

          <section class="event-log-section" aria-label="Game event log">
            <h2>Event Log</h2>
            <div id="event-log" class="event-log" aria-live="polite"></div>
          </section>
        </div>

        <aside class="market market-sidebar" aria-label="Biome Market">
          <h2>Biome Market</h2>
          <div id="market-tiles" class="market-tiles"></div>
          <div class="market-controls" aria-label="Market controls">
            <button id="toggle-split-pick-btn" type="button">−1 ★ Mixed Pair</button>
            <button id="reroll-selected-tokens-btn" type="button">−1 ★ Refresh Tokens</button>
            <button id="reroll-triple-btn" type="button">Reroll 3-of-a-Kind</button>
          </div>
        </aside>
      </div>
      </div>
    </main>

    <div id="floating-status-bar" class="floating-status-bar" aria-live="polite">
      <div class="status-actions status-left">
        <button id="reset-turn-btn" type="button">Reset Turn</button>
      </div>
      <div class="floating-status-center">
        <div id="floating-status-text" class="floating-status-text"></div>
        <div id="replay-controls" class="replay-controls hidden">
          <button id="prev-btn" type="button">◀ Prev</button>
          <button id="next-btn" type="button">Next ▶</button>
          <span id="turn-label">Turn: -</span>
        </div>
      </div>
      <div class="status-actions status-right">
        <button id="rotate-left-btn" type="button">Rotate ⟲ (Z)</button>
        <button id="rotate-right-btn" type="button">Rotate ⟳ (X)</button>
        <button id="confirm-discard-btn" type="button">Confirm Discard</button>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
