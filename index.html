<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solo Cascadia</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <h1>Solo Cascadia</h1>
        </div>
        <button id="restart-btn" type="button">Restart Game</button>
      </header>

      <div class="layout">
        <div class="main-column">
          <section class="top-panel">
            <div class="status-summary">
              <p>Turn: <span id="turn-counter">1 / 20</span></p>
              <p>★ Stars: <span id="star-counter">0</span></p>
              <p>Current score: <span id="score-formula">0 + 0 + 0 = 0</span></p>
            </div>
            <div id="score-breakdown" class="score-breakdown"></div>
          </section>

          <section class="board-section">
            <h2>Biome Map</h2>
            <div id="board" class="hex-board" aria-label="Hex board"></div>
          </section>

          <section class="event-log-section" aria-label="Game event log">
            <h2>Event Log</h2>
            <div id="event-log" class="event-log" aria-live="polite"></div>
          </section>
        </div>

        <aside class="market market-sidebar" aria-label="Biome Market">
          <h2>Biome Market</h2>
          <div id="market-tiles" class="market-tiles"></div>
          <div class="market-controls" aria-label="Market controls">
            <button id="toggle-split-pick-btn" type="button">−1 ★ Mixed Pair</button>
            <button id="reroll-selected-tokens-btn" type="button">−1 ★ Refresh Tokens</button>
            <button id="reroll-triple-btn" type="button">Reroll 3-of-a-Kind</button>
          </div>
        </aside>
      </div>
    </main>

    <div id="floating-status-bar" class="floating-status-bar" aria-live="polite">
      <div class="status-actions status-left">
        <button id="reset-turn-btn" type="button">Reset Turn</button>
      </div>
      <div id="floating-status-text" class="floating-status-text"></div>
      <div class="status-actions status-right">
        <button id="rotate-left-btn" type="button">Rotate ⟲ (Z)</button>
        <button id="rotate-right-btn" type="button">Rotate ⟳ (X)</button>
        <button id="confirm-discard-btn" type="button">Confirm Discard</button>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
