<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Cascadia (Solo Hex)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Mini Cascadia (Solo Hex)</h1>
      <p class="subtitle">Open-ended hex board, rotatable split tiles, and end-game largest-group scoring.</p>

      <section class="top-panel">
        <div>
          <p>Turn: <span id="turn-counter">1 / 20</span></p>
          <p>Phase: <span id="phase-label">Pick a pair</span></p>
          <p>Current Score: <span id="final-score">0</span></p>
          <div id="score-breakdown" class="score-breakdown"></div>
          <p id="status" class="status" aria-live="polite">Choose a pair to begin.</p>
        </div>
        <div class="controls">
          <button id="rotate-left-btn" type="button">Rotate ⟲ (Z)</button>
          <button id="rotate-right-btn" type="button">Rotate ⟳ (X)</button>
          <button id="restart-btn" type="button">Restart</button>
        </div>
      </section>

      <section class="market" aria-label="Pair Market">
        <h2>Pair Market</h2>
        <p>Select one pair. Place the tile first (rotate if needed), then place its token.</p>
        <div id="market-tiles" class="market-tiles"></div>
      </section>

      <section class="board-section">
        <h2>Open-Ended Hex Board</h2>
        <div id="board" class="hex-board" aria-label="Hex board"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
